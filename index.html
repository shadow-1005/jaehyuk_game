<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>언페의 레이싱게임</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:,">

</head>
<body>
  <!-- 배경음악 (사용자 제스처 후 재생) -->
  <audio id="bgm" src="bg_music.mp3" loop preload="auto"></audio>

  <!-- 로비 화면 -->
  <section id="lobby" class="scene scene--lobby">
    <div class="lobby__overlay">
      <h1 class="title">Racing Game</h1>
      <div class="btns">
        <button id="startBtn" class="btn btn--primary">게임 시작</button>
        <button id="creditBtn" class="btn btn--ghost">제작자</button>
      </div>
    </div>
  </section>

  <!-- 제작자 화면 -->
  <section id="credit" class="scene scene--credit" hidden>
    <div class="credit__wrap">언페</div>
  </section>

  <!-- 게임 화면 -->
  <section id="game" class="scene scene--game" hidden>
    <div class="game__frame">
      <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
