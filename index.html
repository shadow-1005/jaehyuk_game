<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이재혁피하기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- 게임 제목 영역 -->
    <div class="title-box">
      <h1>이재혁피하기</h1>
    </div>

    <!-- 버튼 영역 -->
    <div class="menu-buttons">
      <button id="startBtn" class="menu-btn start-btn">게임시작</button>
      <button id="creditBtn" class="menu-btn credit-btn">제작진</button>
    </div>
  </div>

  <!-- 제작진 팝업 -->
  <div id="creditModal" class="modal hidden">
    <div class="modal-content">
      <h2>제작진</h2>
      <!-- 아래 내용은 자유롭게 수정 가능 -->
      <p>기획: 이재혁</p>
      <p>개발: 이재혁 및 gpt</p>
      <p>디자인: 이재혁</p>
      <button id="closeModalBtn">닫기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
