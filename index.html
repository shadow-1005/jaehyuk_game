<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>이재혁피하기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- =========================
       메인 메뉴 화면
  ========================== -->
  <div id="menuScreen" class="screen active">
    <div class="container">
      <div class="title-box">
        <!-- 제목은 여기서 변경 가능 -->
        <h1>이재혁피하기</h1>
      </div>

      <div class="menu-buttons">
        <button id="startBtn" class="menu-btn start-btn">게임시작</button>
        <button id="creditBtn" class="menu-btn credit-btn">제작진</button>
      </div>
    </div>
  </div>

  <!-- =========================
       제작진 팝업
  ========================== -->
  <div id="creditModal" class="modal hidden">
    <div class="modal-content">
      <h2>제작진</h2>
      <!-- 아래 내용은 자유롭게 수정 가능 -->
      <p>기획: 이재혁</p>
      <p>개발: 이재혁 및 gpt</p>
      <p>디자인: 이재혁</p>
      <button id="closeModalBtn">닫기</button>
    </div>
  </div>

  <!-- =========================
       게임 화면
  ========================== -->
  <div id="gameScreen" class="screen">
    <div class="hud">
      <div id="lifeText" class="hud-text left">생명력: 100</div>
      <div id="scoreText" class="hud-text right">점수: 0</div>
    </div>

    <div id="gameArea">
      <!-- 바닥 -->
      <div id="ground"></div>

      <!-- 플레이어 -->
      <img id="player" src="chr_R.png" alt="플레이어" />
    </div>

    <!-- 모바일 터치 버튼 -->
    <div class="mobile-controls">
      <button id="leftBtn" class="control-btn">◀</button>
      <button id="jumpBtn" class="control-btn">점프</button>
      <button id="rightBtn" class="control-btn">▶</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
